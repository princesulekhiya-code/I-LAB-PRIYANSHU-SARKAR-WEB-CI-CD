name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1

          echo "=== Exploring SFTP directory ==="
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" sftp://${{ secrets.FTP_HOST }}:65002 -e "
          set sftp:auto-confirm yes;
          set net:timeout 30;
          set net:max-retries 3;
          pwd;
          ls;
          echo '--- public_html ---';
          ls public_html/;
          quit" || true

          echo "=== Deploying files via SFTP ==="
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" sftp://${{ secrets.FTP_HOST }}:65002 -e "
          set sftp:auto-confirm yes;
          set net:timeout 60;
          set net:max-retries 3;
          cd public_html;
          rm -f default.php;
          mirror -R --verbose --delete --no-perms ./dist/ .;
          quit"

          echo "=== Verifying ==="
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" sftp://${{ secrets.FTP_HOST }}:65002 -e "
          set sftp:auto-confirm yes;
          ls public_html/;
          quit"
