name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to Hostinger via FTP
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1
          echo "=== Checking FTP structure ==="
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_HOST }}" -e "
          set ssl:verify-certificate no;
          set ftp:ssl-allow yes;
          set ftp:ssl-force no;
          set ftp:passive-mode yes;
          pwd;
          echo '--- ROOT ---';
          cls;
          echo '--- PUBLIC_HTML ---';
          cls public_html/;
          quit" || true

          echo "=== Deploying files ==="
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_HOST }}" -e "
          set ssl:verify-certificate no;
          set ftp:ssl-allow yes;
          set ftp:ssl-force no;
          set ftp:passive-mode yes;
          cd public_html;
          glob -a rm -f *;
          glob -a rm -rf */;
          mirror -R --verbose --no-perms dist/ .;
          quit"
