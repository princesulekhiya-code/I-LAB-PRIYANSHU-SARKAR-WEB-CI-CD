name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy via SSH
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1

          echo "=== Exploring directory structure ==="
          sshpass -p "${{ secrets.FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 65002 "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}" "
            echo '--- HOME ---';
            pwd;
            ls -la;
            echo '--- PUBLIC_HTML ---';
            ls -la public_html/;
            echo '--- DOMAINS ---';
            ls -la domains/ 2>/dev/null || echo 'no domains dir';
            ls -la domains/ilabgroup.in/public_html/ 2>/dev/null || echo 'no domains/ilabgroup.in/public_html';
          "

          echo "=== Deploying files ==="
          sshpass -p "${{ secrets.FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 65002 "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}" "
            rm -f public_html/default.php;
            rm -f public_html/.default.php;
          "

          sshpass -p "${{ secrets.FTP_PASSWORD }}" rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no -p 65002" ./dist/ "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}:public_html/"

          echo "=== Verifying deployment ==="
          sshpass -p "${{ secrets.FTP_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 65002 "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}" "ls -la public_html/"
