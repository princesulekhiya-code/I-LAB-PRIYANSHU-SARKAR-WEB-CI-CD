name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Find correct path via FTP
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1
          echo "=== Finding default.php location ==="
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_HOST }}" -e "
          set ssl:verify-certificate no;
          set ftp:ssl-allow yes;
          set ftp:passive-mode yes;
          set net:timeout 30;
          find . | grep -i default;
          quit" || true

          echo "=== Full recursive listing ==="
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_HOST }}" -e "
          set ssl:verify-certificate no;
          set ftp:ssl-allow yes;
          set ftp:passive-mode yes;
          set net:timeout 30;
          find . -d 3;
          quit" || true
