name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Debug FTP and Deploy
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1
          echo "=== FTP ROOT ==="
          lftp -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }} -e "set ssl:verify-certificate no; set ftp:ssl-allow yes; ls; quit" 2>&1 || echo "Root failed"
          echo "=== PUBLIC_HTML ==="
          lftp -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }} -e "set ssl:verify-certificate no; set ftp:ssl-allow yes; cd public_html; ls; quit" 2>&1 || echo "public_html failed"
          echo "=== PWD ==="
          lftp -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_HOST }} -e "set ssl:verify-certificate no; set ftp:ssl-allow yes; pwd; quit" 2>&1 || echo "pwd failed"
