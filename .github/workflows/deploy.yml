name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1

          echo "=== Listing directories ==="
          sshpass -p "${{ secrets.FTP_PASSWORD }}" sftp -P 65002 -o StrictHostKeyChecking=no "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}" <<'EOF'
          pwd
          ls
          ls public_html
          EOF

          echo "=== Removing default.php ==="
          sshpass -p "${{ secrets.FTP_PASSWORD }}" sftp -P 65002 -o StrictHostKeyChecking=no "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}" <<'EOF'
          rm public_html/default.php
          EOF

          echo "=== Uploading files ==="
          sshpass -p "${{ secrets.FTP_PASSWORD }}" scp -P 65002 -o StrictHostKeyChecking=no -r ./dist/* "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}:public_html/"

          echo "=== Verifying ==="
          sshpass -p "${{ secrets.FTP_PASSWORD }}" sftp -P 65002 -o StrictHostKeyChecking=no "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}" <<'EOF'
          ls public_html
          EOF
